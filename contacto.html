<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
</head>
<body>
    <h1>Contacto</h1>
    <p>Envía tu consulta y responderemos a tu correo a la brevedad.</p>

    <form action="https://formspree.io/f/{YOUR_FORM_ID}" method="POST" novalidate>
        <label for="name">Nombre</label><br>
        <input type="text" id="name" name="name" placeholder="Tu nombre" required><br><br>

        <label for="email">Correo electrónico</label><br>
        <input type="email" id="email" name="email" placeholder="tu@correo.com" required><br><br>

        <label for="message">Consulta</label><br>
        <textarea id="message" name="message" rows="5" placeholder="Escribe tu mensaje" required></textarea><br><br>

        <button type="submit">Enviar consulta</button>
    </form>

    <nav id="principal">
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="disenografico.html">Diseño Gráfico</a></li>
            <li><a href="contacto.html">Contacto</a></li>
        </ul>
    </nav>

    <script>
        const form = document.querySelector('form');
        form.addEventListener('submit', function(event) {
            if (!form.checkValidity()) {
                event.preventDefault();
                alert('Por favor completa todos los campos correctamente.');
            }
        });
    </script>
</body>
</html>
